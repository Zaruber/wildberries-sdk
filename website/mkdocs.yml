site_name: Wildberries SDK
site_description: Справочник по всем операциям API Wildberries для Python, Node.js, Go, PHP и Rust.
site_url: https://eslazarev.github.io/wildberries-sdk/
repo_url: https://github.com/eslazarev/wildberries-sdk
repo_name: eslazarev/wildberries-sdk
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

markdown_extensions:
  - admonition
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: ru
  - literate-nav:
      nav_file: SUMMARY.md
